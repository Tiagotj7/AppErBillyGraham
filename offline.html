<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="theme-color" content="#004085" />
  <title>Você está offline</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #212529;
      --subt: #6c757d;
      --accent: #007bff;
      --shadow: 0 8px 30px rgba(0,0,0,.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 1rem;
    }
    .container {
      max-width: 450px;
      width: 100%;
      background: var(--card);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid #dee2e6;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    h1 {
      margin: 0.3rem 0 0.6rem;
      font-size: 1.6rem;
    }
    p {
      margin: 0.5rem 0 1.2rem;
      color: var(--subt);
      line-height: 1.5;
    }
    .actions {
      display: flex;
      gap: .6rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      color: #fff;
      background: var(--accent);
      padding: .65rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: .95rem;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.08); }
    .btn-secondary { background: #6c757d; }
    .status {
      margin-top: 1rem;
      font-size: .9rem;
      color: #495057;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>Sem conexão com a internet</h1>
    <p>Seu dispositivo não está conectado agora. Muitas funcionalidades podem não estar disponíveis offline.</p>
    <div class="actions">
      <button class="btn" type="button" onclick="window.location.reload();">Tentar novamente</button>
      <a class="btn btn-secondary" href="index.php">Ir para a página inicial</a>
    </div>
    <div class="status" id="status">Verificando status de rede...</div>
  </main>

  <script>
    function updateStatus() {
      const el = document.getElementById('status');
      if (navigator.onLine) {
        el.textContent = 'Conexão restaurada! Recarregue a página para continuar.';
        el.style.color = 'green';
      } else {
        el.textContent = 'Você está offline. Recarregue quando voltar a ficar online.';
        el.style.color = '#dc3545';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
